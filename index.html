const IMPL_MULT=[1.0,1.0,1.15,1.30,1.50,1.70]; // idx = module count

function getAuditCost(annualRevenue){
  const tier=AUDIT_COST.find(t=>annualRevenue<=t.maxRev)||AUDIT_COST[AUDIT_COST.length-1];
  return tier.base;
}

function getImplPackageCost(annualRevenue,moduleCount){
  const tier=IMPL_COST.find(t=>annualRevenue<=t.maxRev)||IMPL_COST[IMPL_COST.length-1];
  const mult=IMPL_MULT[Math.min(moduleCount,IMPL_MULT.length-1)]||1.7;
  return Math.round(tier.base*mult);
}

function getMonthlyFee(annualRevenue,moduleCount){
  const tier=MONTHLY_FEE.find(t=>annualRevenue<=t.maxRev)||MONTHLY_FEE[MONTHLY_FEE.length-1];
  const mult=IMPL_MULT[Math.min(moduleCount,IMPL_MULT.length-1)]||1.7;
  return Math.round(tier.baseMo*mult);
}

// Grade F=very low digital maturity → high upside potential
// Grade A=already optimized → limited incremental gain

const REV_CEILING={
  // [grade]: {sector: max_revenue_multiplier}
  F: {medical:1.80,dental:1.80,beauty:1.70,trade:1.60,services:1.50,manufacturing:1.40},
  D: {medical:1.55,dental:1.55,beauty:1.50,trade:1.45,services:1.40,manufacturing:1.30},

  B: {medical:1.22,dental:1.22,beauty:1.20,trade:1.20,services:1.18,manufacturing:1.15},
  A: {medical:1.12,dental:1.12,beauty:1.10,trade:1.10,services:1.10,manufacturing:1.08},
};

// Revenue ceiling by company size (additional dampener for large firms)
const SIZE_CEILING=[
  {maxRev:2e6,   mult:1.0},   // small: full ceiling applies
  {maxRev:5e6,   mult:0.95},  // medium-small: slightly dampened
  {maxRev:12e6,  mult:0.85},  // medium: harder to move needle
  {maxRev:50e6,  mult:0.70},  // medium-large: significant dampening
  {maxRev:250e6, mult:0.55},  // large: hardest to grow %
];

function getRevenueCeiling(annualRevenue, sector, auditGrade){
  const grade=auditGrade||"C"; // default if no audit
  const gradeRow=REV_CEILING[grade]||REV_CEILING.C;
  const baseMult=gradeRow[sector]||gradeRow.medical||1.30;
  const sizeDamp=SIZE_CEILING.find(s=>annualRevenue<=s.maxRev)||SIZE_CEILING[SIZE_CEILING.length-1];
  // Effective ceiling: interpolate between 1.0 (no growth) and baseMult
  const effectiveMult=1+(baseMult-1)*sizeDamp.mult;
  return effectiveMult;
}

function getAuditGrade(evalResult){
  if(!evalResult)return "C";
  const avg=Object.values(evalResult.scores).reduce((a,b)=>a+b,0)/6;
  return avg>=80?"A":avg>=65?"B":avg>=45?"C":avg>=25?"D":"F";
}

// ══════════════════════════════════════════════════════════════
// CALCULATION ENGINE (reference-table-driven + revenue ceiling)
// ══════════════════════════════════════════════════════════════
function adopt(t,ti,tf,r){return 1/(1+Math.exp(-0.8*(t-ti-0.4*(ti+tf)*(r<30?1.4:r<60?1:0.75))));}
function boxM(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function gamS(a){if(a<1)return gamS(a+1)*Math.pow(Math.random(),1/a);const d=a-1/3,c=1/Math.sqrt(9*d);let x,v;do{do{x=boxM();v=1+c*x}while(v<=0);v=v*v*v;const u=Math.random();if(u<1-0.0331*x*x*x*x||Math.log(u)<0.5*x*x+d*(1-v+Math.log(v)))return d*v}while(1);}
function betaS(a,b){const x=gamS(a);return x/(x+gamS(b));}

// Calculate module delta from MSUM reference table
function calcModDelta(mk,inp,pl,scenarioKey){
  const ms=MSUM[mk];if(!ms)return 0;
  const imp=scenarioKey==="S1"||scenarioKey==="S0"?ms.ci:scenarioKey==="S2"?ms.mi:ms.oi;
  const{annualRevenue:ar,employees:emp,monthlyVisits:mv,avgVisitValue:avv,noshowRate:nsr}=inp;
  const isMed=["medical","dental","beauty"].includes(inp.sector);
  let d=0;
  if(mk==="M_BOOKING"&&isMed&&mv>0){d=mv*(nsr/100)*((imp.no_show_reduction||50)/100)*avv*pl;}
  else if(mk==="M_WEBSITE_SEO"){d=mv*0.15*((imp.new_patients_increase||60)/100)*0.88*avv*3.5/12*pl;}
  else if(mk==="M_CRM_AUTOMATION"){d=(ar/12)*((imp.sales_increase||20)/100)*pl;}
  else if(mk==="M_DIGITAL_MARKETING"){d=(ar*0.05/12)*(((imp.roi||300)/100)-1)*pl;}
  else if(mk==="M_BI_DASHBOARD"){d=(ar*0.35/12)*((imp.operational_efficiency||20)/100)*pl;}
  else if(mk==="M_AI_AUTOMATION"){d=emp*(ar>5e6?9000:5500)*0.40*((imp.process_time_reduction||50)/100)*pl;}
  // Scale for S0 worst case
  if(scenarioKey==="S0")d*=0.40;
  else if(scenarioKey==="S1")d*=0.60;
  else if(scenarioKey==="S2")d*=0.85;
  // S3 = 1.0, S4 = 1.30
  else if(scenarioKey==="S4")d*=1.30;
  return d;
}

function calcFull(inp,auditGrade){
  const pl=SECTORS.find(s=>s.id===inp.sector)?.pl||0.7;
  const r=inp.annualRevenue>20e6?0.08:inp.annualRevenue>5e6?0.10:0.12;
  const rm=Math.pow(1+r,1/12)-1;
  const nMod=inp.modules.length;
  const sy=nMod<=1?1:nMod<=3?1.08:nMod<=5?1.15:1.2;
  const cx=nMod<=1?4:nMod<=3?6:nMod<=5?8:12;
  const isMed=["medical","dental","beauty"].includes(inp.sector);

  // Revenue ceiling from reference table
  const ceilingMult=getRevenueCeiling(inp.annualRevenue,inp.sector,auditGrade);
  const maxMonthlyGrowth=(inp.annualRevenue/12)*(ceilingMult-1); // max additional monthly revenue

  // ── 3-PHASE PRICING ──
  const auditCost=getAuditCost(inp.annualRevenue);
  const implCost=getImplPackageCost(inp.annualRevenue,nMod);
  const monthlyFee=getMonthlyFee(inp.annualRevenue,nMod);
  const annualFee=monthlyFee*12;
  const it=Math.max(...inp.modules.map(m=>MOD[m]?.im||3));
  const kpiMonth=Math.round(it+cx*0.2); // when KPI first achieved (~25% adoption)

  // Success fee: 15% on (gross_growth_above_baseline)
  // baseline = client's revenue before our intervention
  // fee only applies AFTER KPI achieved
  const calcSF=(monthlyGross)=>{
    if(monthlyGross<=0)return 0;
    const sf=monthlyGross*0.15; // 15% of all new gross revenue
    const cap=annualFee*2.5/12; // cap: 2.5× annual fee / 12
    return Math.min(sf,cap);
  };

  const hasCeiling=isMed&&inp.monthlyVisits>0&&(inp.monthlyVisits*inp.avgVisitValue*12/inp.annualRevenue>0.6)||nMod>=4||inp.annualRevenue>5e6;
  const scenKeys=["S0","S1","S2","S3"];
  if(hasCeiling)scenKeys.push("S4");

  const results={};
  for(const sn of scenKeys){
    let grossDelta=0;const md=[];
    for(const mk of inp.modules){
      const d=calcModDelta(mk,inp,pl,sn);
      grossDelta+=d;
      md.push({key:mk,label:MOD[mk]?.label||mk,icon:MOD[mk]?.icon||"📦",total:d});
    }
    grossDelta*=sy;
    if(sn==="S0")grossDelta*=(1-0.15);

    // Apply revenue ceiling
    grossDelta=Math.min(grossDelta,maxMonthlyGrowth);
    if(grossDelta<md.reduce((s,m)=>s+m.total,0)*sy){
      const rawTotal=md.reduce((s,m)=>s+m.total,0)*sy;
      const ratio=rawTotal>0?grossDelta/rawTotal:1;
      md.forEach(m=>m.total=m.total*ratio);
    }

    const adoptMult=sn==="S0"?1.5:1;

    // Build cashflow: month 0 = audit, month 1..impl = implementation, then KPI→monthly fee + SF
    let cum=-auditCost; // Phase 1: audit upfront
    const cfs=[{month:0,cf:-auditCost,cum:-auditCost,dcf:-auditCost,gross:0,fixed:0,sf:0,net:-auditCost,phase:"Audyt"}];
    let totalImpl=0,totalFee=0,totalSF=0;
    const implMonthly=Math.round(implCost/Math.max(it,1)); // spread impl cost over impl months

    for(let t=1;t<=24;t++){
      const a=adopt(t,it*adoptMult,cx*adoptMult,inp.readiness);
      const gross=Math.round(grossDelta*a);
      const kpiAchieved=t>=kpiMonth*adoptMult;

      // Phase 2: implementation cost (months 1..impl)
      const impl=t<=it?implMonthly:0;
      totalImpl+=impl;

      // Phase 3: monthly fee + SF starts AFTER KPI achieved
      const fee=kpiAchieved?monthlyFee:0;
      const sf=kpiAchieved?Math.round(calcSF(gross)):0;
      totalFee+=fee;totalSF+=sf;

      const costs=impl+fee+sf;
      const net=gross-costs;
      cum+=net;
      cfs.push({month:t,cf:Math.round(net),cum:Math.round(cum),dcf:Math.round(net/Math.pow(1+rm,t)),gross,impl,fixed:fee,sf,net:Math.round(net),phase:t<=it?"I Pakiet":kpiAchieved?"Fee+SF":"Wdrożenie"});
    }
    const npv=cfs.reduce((s,c)=>s+c.dcf,0);
    const pb=cfs.find(c=>c.month>0&&c.cum>=0)?.month||99;

    // IRR
    let irr=0.01;
    for(let j=0;j<25;j++){let f=0,df=0;for(const c of cfs){const v=c.net||0;f+=v/Math.pow(1+irr,c.month);df-=c.month*v/Math.pow(1+irr,c.month+1);}if(Math.abs(df)<1e-10)break;irr=Math.max(-0.5,Math.min(irr-f/df,10));}

    const totalInvestment=auditCost+implCost; // upfront phases
    const totalCostAll=auditCost+implCost+totalFee+totalSF; // everything over 24m

    results[sn]={npv:Math.round(npv),pb:Math.min(pb,24),roi:Math.round((totalInvestment+npv)/totalInvestment*10)/10,irr:Math.round(irr*1200)/100,
      auditCost,implCost,totalInvestment,monthlyFee,annualFee,totalFee,totalSF:Math.round(totalSF),totalCostAll,kpiMonth:Math.round(kpiMonth*adoptMult),
      grossDelta:Math.round(grossDelta),netDelta:Math.round(grossDelta-monthlyFee-calcSF(grossDelta)),
      cfs,md,r,
      ba:inp.modules.map(mk=>{const mo=MOD[mk];if(!mo?.ba)return null;if(mk==="M_BOOKING"&&!isMed)return null;return{label:mo.ba.metric,unit:mo.ba.unit,icon:mo.icon,before:mo.ba.before(mk==="M_BOOKING"?inp.noshowRate:mk==="M_WEBSITE_SEO"?inp.monthlyVisits:0),after:mo.ba.after(mk==="M_BOOKING"?inp.noshowRate:mk==="M_WEBSITE_SEO"?inp.monthlyVisits:inp.employees,sn)};}).filter(Boolean),
    };
  }

  // Monte Carlo (5000 iter) — 3-phase pricing with ceiling
  const mcNPVs=[];
  for(let i=0;i<5000;i++){

    let mD=0;for(const mk of inp.modules){const ms=MSUM[mk];if(!ms)continue;const imp=sc<0.5?ms.ci:sc<0.85?ms.mi:ms.oi;let d=0;
      if(mk==="M_BOOKING"&&isMed&&inp.monthlyVisits>0)d=inp.monthlyVisits*(inp.noshowRate/100)*((imp.no_show_reduction||50)/100)*inp.avgVisitValue*pl;
      else if(mk==="M_WEBSITE_SEO")d=inp.monthlyVisits*0.15*((imp.new_patients_increase||60)/100)*0.88*inp.avgVisitValue*3.5/12*pl;
      else if(mk==="M_CRM_AUTOMATION")d=(inp.annualRevenue/12)*((imp.sales_increase||20)/100)*pl;
      else if(mk==="M_DIGITAL_MARKETING")d=(inp.annualRevenue*0.05/12)*(((imp.roi||300)/100)-1)*pl;

      mD+=d*sc;}
    mD=Math.min(mD*sy,maxMonthlyGrowth);
    let npv=-auditCost;const implM=Math.round(implCost/Math.max(it,1));
    for(let t=1;t<=24;t++){const a=adopt(t,it*tj,cx*tj,inp.readiness);const gross=mD*a;const impl2=t<=it?implM:0;const kpi=t>=kpiMonth*tj;const fee2=kpi?monthlyFee:0;const sf2=kpi?Math.min(gross*0.15,annualFee*2.5/12):0;npv+=(gross-impl2-fee2-sf2)/Math.pow(1+rm,t);}
    mcNPVs.push(npv);
  }
  mcNPVs.sort((a,b)=>a-b);
  const pc=p=>mcNPVs[Math.floor(p/100*(mcNPVs.length-1))];
  const mc={p5:Math.round(pc(5)),p15:Math.round(pc(15)),p50:Math.round(pc(50)),p75:Math.round(pc(75)),p90:Math.round(pc(90)),mean:Math.round(mcNPVs.reduce((a,b)=>a+b,0)/mcNPVs.length),pos:Math.round(mcNPVs.filter(v=>v>0).length/mcNPVs.length*100)};

  const miles=[{m:0,l:"Start",d:"Audyt + kick-off",i:"🚀"},{m:it,l:"Wdrożenie live",d:`${nMod} moduł(ów)`,i:"⚙️"},{m:Math.round(it+cx*0.2),l:"Pierwsze efekty",d:"25% adopcji",i:"📈"},{m:Math.min(results.S2?.pb||12,24),l:"Break-even",d:"Zwrot inwestycji",i:"💰"},{m:24,l:"Koniec horyzontu",d:`NPV (24m): ${fmt(results.S2?.npv||0)} PLN`,i:"🏁"}];

            <div style={{padding:"14px 16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:9,color:"rgba(250,246,239,0.25)",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px"}}>Monte Carlo — NPV netto (po fixed fee + success fee)</span><span style={{fontSize:12,fontFamily:T.fd,color:T.g}}>W {res.mc.pos}% zarabiasz</span></div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4}}>{[["P5",res.mc.p5,T.no],["P15",res.mc.p15,T.wa],["P50",res.mc.p50,T.g],["P75",res.mc.p75,T.gl],["P90",res.mc.p90,T.ok],["Śr.",res.mc.mean,"rgba(250,246,239,0.5)"]].map(([l,v,c])=><div key={l} style={{textAlign:"center",padding:"6px",borderRadius:6,background:"rgba(255,255,255,0.02)"}}><div style={{fontSize:8,color:"rgba(250,246,239,0.25)",textTransform:"uppercase"}}>{l}</div><div style={{fontSize:12,fontFamily:T.fd,color:c}}>{fP(v)}</div></div>)}</div>
            </div>

            {/* Cashflow */}
            <div style={{padding:"14px 12px 6px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14}}>
              <div style={{fontSize:9,color:"rgba(250,246,239,0.25)",marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:"2px"}}>Cashflow netto 24 mies. (po fixed fee + success fee)</div>
              <ResponsiveContainer width="100%" height={200}><AreaChart data={sc.cfs} margin={{top:5,right:8,left:0,bottom:0}}><defs><linearGradient id="gCF" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.g} stopOpacity={0.2}/><stop offset="100%" stopColor={T.g} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.02)"/><XAxis dataKey="month" stroke="rgba(250,246,239,0.1)" fontSize={9} tickFormatter={v=>`M${v}`}/><YAxis stroke="rgba(250,246,239,0.1)" fontSize={9} tickFormatter={v=>fmt(v)}/><Tooltip contentStyle={{background:T.tm,border:`1px solid ${T.gb}`,borderRadius:8,fontSize:10,color:T.cr}} formatter={(v,n)=>[fP(v),{cum:"Skumulowany netto",cf:"Netto/mies.",gross:"Brutto",fixed:"Fixed fee",sf:"Success fee"}[n]||n]} labelFormatter={v=>`Miesiąc ${v}`}/><ReferenceLine y={0} stroke={T.gb} strokeDasharray="4 4"/><Area type="monotone" dataKey="cum" stroke={T.g} fill="url(#gCF)" strokeWidth={2}/><Line type="monotone" dataKey="gross" stroke="rgba(39,174,96,0.4)" strokeWidth={1} dot={false}/><Line type="monotone" dataKey="fixed" stroke="rgba(192,57,43,0.3)" strokeWidth={1} dot={false} strokeDasharray="4 4"/></AreaChart></ResponsiveContainer>
            </div>

            {/* Module breakdown */}
            <div style={{padding:"14px 16px 10px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14}}>
              <div style={{fontSize:9,color:"rgba(250,246,239,0.25)",marginBottom:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"2px"}}>Efekty brutto per moduł (100% adopcji)</div>
              {sc.md.map((m,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderTop:i?"1px solid rgba(255,255,255,0.02)":"none"}}><span style={{fontSize:12,color:"rgba(250,246,239,0.4)"}}>{m.icon} {m.label}</span><span style={{fontSize:13,fontFamily:T.fd,color:T.g}}>+{fP(Math.round(m.total))}/mies.</span></div>)}
              <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 0",borderTop:`1px solid ${T.gb}`,marginTop:4}}>
                <span style={{fontSize:12,fontWeight:700,color:T.cr}}>Brutto łącznie (synergy ×{res.sy})</span><span style={{fontSize:14,fontFamily:T.fd,color:T.g}}>+{fP(sc.grossDelta)}/mies.</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:"rgba(250,246,239,0.35)"}}>
                <span>Minus miesięczne fee (od M{sc.kpiMonth}):</span><span style={{color:T.no}}>−{fP(sc.monthlyFee)}/mies.</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(250,246,239,0.35)"}}>
                <span>Minus success fee (śr.):</span><span style={{color:T.no}}>−{fP(Math.round(sc.totalSF/Math.max(24-sc.kpiMonth,1)))}/mies.</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0",borderTop:`1.5px solid ${T.gb}`,marginTop:6}}>
                <span style={{fontSize:12,fontWeight:700,color:T.cr}}>= Zysk netto klienta</span><span style={{fontSize:14,fontFamily:T.fd,color:sc.netDelta>0?T.ok:T.no,fontWeight:600}}>{sc.netDelta>0?"+":""}{fP(sc.netDelta)}/mies.</span>
              </div>
            </div>

            {/* Proof points */}
            <div style={{padding:"14px 16px",borderRadius:12,background:"rgba(39,174,96,0.04)",border:"1px solid rgba(39,174,96,0.1)",marginBottom:14}}>
              <div style={{fontSize:9,color:T.ok,fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:8}}>Uzasadnienie — {res.benchUsed.length} benchmarków użytych w kalkulacji</div>
              {inp.modules.map(mk=>{const benchmarks=res.benchUsed.filter(b=>b.mod===mk);return benchmarks.length?<div key={mk} style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:600,color:"rgba(250,246,239,0.4)"}}>{MOD[mk]?.icon} {MOD[mk]?.label} ({benchmarks.length} bench.)</div>{benchmarks.slice(0,3).map(b=><div key={b.id} style={{fontSize:10,color:"rgba(250,246,239,0.25)",paddingLeft:12,lineHeight:1.5}}>› [{b.id}] {b.name} — {b.c}/{b.m}/{b.o} {b.unit} ({b.src}, {b.yr})</div>)}</div>:null})}
            </div>

            {/* Timeline */}
            <div style={{padding:"14px 16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14}}>
              <div style={{fontSize:9,color:"rgba(250,246,239,0.25)",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:10}}>Kamienie milowe</div>
              <div style={{display:"flex",gap:6,overflowX:"auto"}}>{res.miles.map((m,i)=><div key={i} style={{flex:"0 0 auto",padding:"8px 12px",borderRadius:8,background:T.gs,border:`1px solid ${T.gb}`,minWidth:100,textAlign:"center"}}><div style={{fontSize:14,marginBottom:2}}>{m.i}</div><div style={{fontSize:11,fontFamily:T.fd,color:T.g}}>M{m.m}</div><div style={{fontSize:9,color:"rgba(250,246,239,0.4)"}}>{m.l}</div></div>)}</div>
            </div>
          </div>}

          {/* ── CFO TAB ── */}
          {rTab==="cfo"&&<div>
            {/* Sensitivity */}
            <div style={{padding:"18px 16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14}}>
              <div style={{fontSize:9,color:"rgba(250,246,239,0.25)",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:12}}>Analiza wrażliwości — stopa dyskontowa</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:"rgba(250,246,239,0.4)"}}>WACC</span><span style={{fontSize:15,fontFamily:T.fd,color:T.g}}>{(effR*100).toFixed(0)}%</span></div>
              <input type="range" min={4} max={20} step={1} value={Math.round(effR*100)} onChange={e=>setSensRate(Number(e.target.value))} style={{width:"100%",accentColor:T.g,height:5,cursor:"pointer"}}/>
              {sensRate!==null&&<div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:T.gs,border:`1px solid ${T.gb}`,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"rgba(250,246,239,0.4)"}}>NPV przy {sensRate}%:</span><span style={{fontSize:14,fontFamily:T.fd,color:sensNPV>0?T.ok:T.no}}>{fP(sensNPV)} ({sensNPV>sc.npv?"+":"−"}{fP(Math.abs(sensNPV-sc.npv))})</span></div>}
            </div>

            {/* Model assumptions */}
            <div style={{padding:"16px 16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14,fontSize:11,lineHeight:1.8,color:"rgba(250,246,239,0.35)"}}>
              <div style={{fontSize:9,fontWeight:700,color:"rgba(250,246,239,0.4)",marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>Założenia modelu</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 16px"}}>
                <span>Stopa dyskontowa:</span><span style={{color:T.g}}>{(sc.r*100).toFixed(0)}% (WACC + size premium)</span>
                <span>Mnożnik PL:</span><span style={{color:T.g}}>×{sec?.pl||0.70} ({sec?.label})</span>
                <span>Synergy:</span><span style={{color:T.g}}>×{res.sy} ({inp.modules.length} moduł(ów))</span>
                <span>Adopcja:</span><span>Sigmoid k=0.8, readiness={inp.readiness}%</span>
                <span>Monte Carlo:</span><span>5 000 iter., beta(4,3), lognormal</span>
                <span>Fixed fee:</span><span style={{color:T.g}}>{fP(res.monthlyFee)}/mies. ({fP(res.annualFee)}/rok) — od osiągnięcia KPI</span>
                <span>Success fee:</span><span>15% od (wzrost brutto − fixed fee), cap 2.5× annual</span>
                <span>Sufit operacyjny:</span><span style={{color:T.g}}>×{res.ceilingMult.toFixed(2)} (audyt {res.auditGrade}) = max +{fP(res.maxMonthlyGrowth)}/mies.</span>
                <span>Wagi EV (CRO):</span><span>S1=0.20 S2=0.40 S3=0.25 S4=0.12</span>
              </div>
              <div style={{marginTop:10,padding:"10px 12px",borderRadius:8,background:T.gs,border:`1px solid ${T.gb}`}}>
                <span style={{color:"rgba(250,246,239,0.4)"}}>Wartość oczekiwana NPV: </span><span style={{fontFamily:T.fd,color:T.g,fontSize:14}}>{fP(res.ev)}</span>
              </div>
            </div>

            {/* Stress test */}
            {res.scenarios.S0&&<div style={{padding:"14px 16px",borderRadius:12,background:"rgba(192,57,43,0.05)",border:"1px solid rgba(192,57,43,0.12)",marginBottom:14}}>
              <div style={{fontSize:9,color:T.no,fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:8}}>Stress test S0</div>
              <div style={{fontSize:12,color:"rgba(250,246,239,0.4)",lineHeight:1.8}}>NPV: <strong style={{color:T.no}}>{fP(res.scenarios.S0.npv)}</strong> · Adopcja ×1.5 wolniejsza · Efekty ×0.40 · Churn 15%<br/>{res.scenarios.S0.npv<-res.totalInvestment*1.5?<span style={{color:T.no}}>❌ Model niestabilny</span>:<span style={{color:T.wa}}>⚠ Rentowność niepewna</span>}</div>
            </div>}

            {/* Browse benchmark DB */}
            <button onClick={()=>setShowBench(!showBench)} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1px solid ${T.gb}`,background:showBench?"rgba(255,255,255,0.02)":"transparent",color:"rgba(250,246,239,0.35)",fontSize:11,cursor:"pointer",fontFamily:T.fb,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showBench?0:14}}>
              <span>📊 Baza benchmarków — {BENCH.length} rekordów, {Object.keys(MSUM).length} modułów</span><span style={{transform:showBench?"rotate(180deg)":"",transition:"transform 0.2s"}}>▾</span>
            </button>
            {showBench&&<div style={{padding:"14px",borderRadius:"0 0 12px 12px",background:"rgba(255,255,255,0.015)",border:`1px solid ${T.gb}`,borderTop:"none",marginBottom:14,maxHeight:400,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,fontFamily:T.fb}}>
                <thead><tr>{["ID","Moduł","KPI","C","M","O","Źródło","Rok","Conf."].map(h=><th key={h} style={{padding:"5px 6px",borderBottom:`1px solid ${T.gb}`,color:"rgba(250,246,239,0.3)",textAlign:"left",fontSize:9,fontWeight:700}}>{h}</th>)}</tr></thead>
                <tbody>{BENCH.map(b=>{const used=res.benchUsed.some(u=>u.id===b.id);return (<tr key={b.id} style={{background:used?"rgba(200,150,62,0.04)":"transparent"}}>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:used?T.g:"rgba(250,246,239,0.3)",fontWeight:used?600:400}}>{b.id}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:"rgba(250,246,239,0.3)"}}>{b.mod.replace("M_","")}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:"rgba(250,246,239,0.4)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.kpi}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:T.no,textAlign:"center"}}>{b.c}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:T.g,textAlign:"center",fontWeight:600}}>{b.m}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:T.ok,textAlign:"center"}}>{b.o}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:"rgba(250,246,239,0.3)",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.src}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:"rgba(250,246,239,0.25)"}}>{b.yr}</td>
                  <td style={{padding:"4px 6px",borderBottom:"1px solid rgba(255,255,255,0.02)",color:b.conf==="high"?T.ok:T.wa}}>{b.conf}</td>
                </tr>)})}</tbody>
              </table>
              <div style={{fontSize:9,color:"rgba(250,246,239,0.2)",marginTop:8}}>Wiersze podświetlone na złoto = użyte w tej symulacji ({res.benchUsed.length} z {BENCH.length})</div>
            </div>}

            {/* Source weights */}
            <div style={{padding:"14px 16px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${T.gb}`,marginBottom:14}}>
              <div style={{fontSize:9,color:"rgba(250,246,239,0.25)",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:8}}>Wagi wiarygodności źródeł</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"3px 16px",fontSize:11,color:"rgba(250,246,239,0.35)"}}>
                {Object.entries(SRC_W).map(([k,v])=><div key={k} style={{display:"contents"}}><span>{k.replace(/_/g," ")}:</span><span style={{color:T.g}}>{v.toFixed(2)}</span></div>)}
              </div>
            </div>
          </div>}

          {/* Bottom */}
          <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:18}}>
            <a href="https://aisolution4.you/#kontakt" target="_blank" rel="noopener" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"16px 24px",borderRadius:10,background:`linear-gradient(135deg,${T.g},${T.gl})`,color:T.td,fontSize:14,fontWeight:700,fontFamily:T.fb,textDecoration:"none",border:`2px solid ${T.g}`,boxShadow:"0 4px 20px rgba(200,150,62,0.25)"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3"/></svg>
              Otrzymaj szczegółowy raport — umów bezpłatną konsultację
            </a>
            <button onClick={()=>{setStep(0);setRes(null);setEv(null);setUrl("");setRTab("scorecard");setSensRate(null);setShowBench(false);}} style={{padding:"10px 18px",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"rgba(250,246,239,0.25)",fontSize:12,cursor:"pointer",fontFamily:T.fb,textAlign:"center"}}>← Nowa symulacja</button>
          </div>
        </div>);
      })()}

      {/* NAV BUTTONS */}
      {step<5&&<div style={{display:"flex",justifyContent:"space-between",marginTop:24,gap:12}}>
        {step>0?<button onClick={()=>setStep(step-1)} style={{padding:"10px 20px",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)",background:"transparent",color:"rgba(250,246,239,0.25)",fontSize:13,cursor:"pointer",fontFamily:T.fb}}>← Wstecz</button>:<div/>}
        <button onClick={()=>{if(step===1&&ev){applyRec();return}if(step===1&&!ev){setStep(2);return}if(step===4){setRes(calcFull(inp,auditG));setStep(5);return}setStep(step+1)}} disabled={step===0?!inp.sector:step===2?inp.modules.length===0:false} style={{padding:"12px 24px",borderRadius:8,border:`2px solid ${T.g}`,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:T.fb,background:`linear-gradient(135deg,${T.g},${T.gl})`,color:T.td,boxShadow:"0 4px 20px rgba(200,150,62,0.25)"}}>{step===4?"Oblicz prognozę →":step===1&&ev?"Zastosuj rekomendacje →":step===1?"Pomiń audyt →":"Dalej →"}</button>
      </div>}
    </main>
  </div>);
}


// ── Mount ──
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
